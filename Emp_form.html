<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Form</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Employee Form Using JPDB API</h2>
        <form id="empForm" method="post">
            <div class="form-group">
                <label for="id">Employee ID:</label>
                <input type="text" class="form-control" name="id" id="id" placeholder="Enter Employee ID">
            </div>
            <div class="form-group">
                <label for="name">Employee Name:</label>
                <input type="text" class="form-control" id="name" placeholder="Enter Employee Name" name="name">
            </div>
            <div class="form-group">
                <label for="salary">Salary:</label>
                <input type="number" class="form-control" id="salary" placeholder="Enter Employee Salary" name="salary">
            </div>
            <div class="form-group">
                <label for="hra">HRA:</label>
                <input type="number" class="form-control" id="hra" placeholder="Enter House Rent Allowance" name="hra">
            </div>
            <div class="form-group">
                <label for="da">DA:</label>
                <input type="number" class="form-control" id="da" placeholder="Enter Dearness Allowance" name="da">
            </div>
            <div class="form-group">
                <label for="deduction">Deduction:</label>
                <input type="number" class="form-control" id="deduction" placeholder="Enter Employee Deduction" name="deduction">
            </div>
            <input type="button" class="btn btn-primary" id="save" value="Save" onclick="saveEmployee();" disabled>
            <input type="button" class="btn btn-primary" id="change" value="Change" onclick="changeEmployee();" disabled>
            <input type="button" class="btn btn-primary" id="reset" value="Reset" onclick="resetEmployee();" disabled>
        </form>
    </div>

    <script>
        function buttonsDefault() {
            $("#save").prop("disabled", true);
            $("#change").prop("disabled", true);
            $("#reset").prop("disabled", true);
        }
        function resetEmployee() {
            buttonsDefault();
            $("#id").val("").prop("disabled", false);
            $("#name").val("").prop("disabled", true);
            $("#salary").val("").prop("disabled", true);
            $("#hra").val("").prop("disabled", true);
            $("#da").val("").prop("disabled", true);
            $("#deduction").val("").prop("disabled", true);
            $("#id").focus();
        }
        function validateAndGetFormData() {
            var idVar = $("#id").val();
            if (idVar === "") {
                $("#name").val("").prop("disabled", true);
                $("#salary").val("").prop("disabled", true);
                $("#hra").val("").prop("disabled", true);
                $("#da").val("").prop("disabled", true);
                $("#deduction").val("").prop("disabled", true);
                buttonsDefault();
                return "";
            }
            $("#name").prop("disabled", false);
            $("#salary").prop("disabled", false);
            $("#hra").prop("disabled", false);
            $("#da").prop("disabled", false);
            $("#deduction").prop("disabled", false);
            var searchKey = JSON.stringify({ id: idVar });
            var getRequest = createGET_BY_KEYRequest("90935222|-31949242385952273|90958832", "EMP-DB", "EmpData", searchKey);
            jQuery.ajaxSetup({ async: false });
            var resultObj = executeCommandAtGivenBaseUrl(getRequest, "http://api.login2explore.com:5577", "/api/irl");
            jQuery.ajaxSetup({ async: true });
            if (resultObj.status === 400) {
                $("#name").focus();
                $("#save").prop("disabled", false);
                $("#reset").prop("disabled", false);
            }
            else if (resultObj.status === 200) {
                var data = JSON.parse(resultObj.data).record;
                $("#name").focus();
                $("#change").prop("disabled", false);
                $("#reset").prop("disabled", false);
                $("#id").prop("disabled", true);
                $("#name").val(data.name);
                $("#salary").val(data.salary);
                $("#hra").val(data.hra);
                $("#da").val(data.da);
                $("#deduction").val(data.deduction);
            }
            return JSON.stringify(resultObj);
        }
        function validateFields() {
            var id = $("#id").val();
            var name = $("#name").val();
            var salary = $("#salary").val();
            var hra = $("#hra").val();
            var da = $("#da").val();
            var deduction = $("#deduction").val();
            if (id === "" || name === "" || salary === "" || hra === "" || da === "" || deduction === "") {
                alert("All fields are required");
                return false;
            }
            return true;
        }
        function saveEmployee() {
            if (!validateFields()) return;
            var jsonStrObj = {
                id: $("#id").val(),
                name: $("#name").val(),
                salary: $("#salary").val(),
                hra: $("#hra").val(),
                da: $("#da").val(),
                deduction: $("#deduction").val()
            }
            var putReqStr = createPUTRequest("90935222|-31949242385952273|90958832", JSON.stringify(jsonStrObj), "EMP-DB", "EmpData");
            jQuery.ajaxSetup({ async: false });
            var resultObj = executeCommandAtGivenBaseUrl(putReqStr, "http://api.login2explore.com:5577", "/api/iml")
            jQuery.ajaxSetup({ async: true });
            alert(JSON.stringify(resultObj));
            resetEmployee();
            alert("Record Saved Successfully");
        }
        function changeEmployee() {
            if (!validateFields()) return;
            var jsonStrObj = {
                id: $("#id").val(),
                name: $("#name").val(),
                salary: $("#salary").val(),
                hra: $("#hra").val(),
                da: $("#da").val(),
                deduction: $("#deduction").val()
            }
            var recordKeyResponse = validateAndGetFormData();
            var recordKey = JSON.parse(JSON.parse(recordKeyResponse).data).rec_no;
            var updateRequest = createUPDATERecordRequest("90935222|-31949242385952273|90958832", JSON.stringify(jsonStrObj), "EMP-DB", "EmpData", recordKey);
            jQuery.ajaxSetup({ async: false });
            var resultObj = executeCommandAtGivenBaseUrl(updateRequest, "http://api.login2explore.com:5577", "/api/iml")
            jQuery.ajaxSetup({ async: true });
            alert(JSON.stringify(resultObj));
            resetEmployee();
            alert("Record Changed Successfully");
        }
        resetEmployee();
        $("#id").on("input", function() {
            $("#name").prop("disabled", true);
            $("#salary").prop("disabled", true);
            $("#hra").prop("disabled", true);
            $("#da").prop("disabled", true);
            $("#deduction").prop("disabled", true);
            buttonsDefault();
        });
        $("#id").on("blur", validateAndGetFormData);
        $("#id").on("keypress", function (event) {
            if (event.which == 13) {
                validateAndGetFormData();
            }
        });
    </script>
</body>
</html>
