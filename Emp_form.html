<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="http://login2explore.com/jpdb/resources/js/0.0.3/jpdb-commons.js"></script>
</head>

<body>
    <div class="container">
        <h2 style="text-align: center;">Employee Form Using JPDB API</h2>
        <form id="empForm" method="post">
            <div class="form-group">
                <span><label for="empId">Employee ID:</label> <label id="empIdMsg">
                    </label></span>
                <input type="text" class="form-control" name="empId" id="empId" placeholder="Enter Employee ID"
                    required>
            </div>
            <div class="form-group">
                <label for="empName">Employee Name:</label>
                <input type="text" class="form-control" id="empName" placeholder="Enter Employee Name" name="empName">
            </div>
            <div class="form-group">
                <label for="empSalry">Email:</label>
                <input type="number" class="form-control" id="empSalary" placeholder="Enter Employee Salary"
                    name="empSalary">
            </div>
            <div class="form-group">
                <label for="empHRA">HRA:</label>
                <input type="number" class="form-control" id="empHRA" placeholder="Enter House Rent Allowance"
                    name="empHRA">
            </div>
            <div class="form-group">
                <label for="empDA">DA:</label>
                <input type="number" class="form-control" id="empDA" placeholder="Enter Employee Salary" name="empDA">
            </div>
            <div class="form-group">
                <label for="empDeduction">Deduction:</label>
                <input type="number" class="form-control" id="empDeduction" placeholder="Enter Employee Deduction"
                    name="empDeduction">
            </div>
            <input type="button" class="btn btn-primary" id="empSave" value="Save" onclick="saveEmployee();">
            <input type="button" class="btn btn-primary" id="empChange" value="Change" onclick="changeEmployee();">
            <input type="button" class="btn btn-primary" id="empReset" value="Reset" onclick="resetEmployee();">
        </form>
    </div>

    <script>
        function buttonsDefault() {
            $("#empSave").prop("disabled", true);
            $("#empChange").prop("disabled", true);
            $("#empReset").prop("disabled", true);
        }
        function resetEmployee() {
            buttonsDefault();
            $("#empId").val("").prop("disabled", false);
            $("#empName").val("").prop("disabled", true);
            $("#empSalary").val("").prop("disabled", true);
            $("#empHRA").val("").prop("disabled", true);
            $("#empDA").val("").prop("disabled", true);
            $("#empDeduction").val("").prop("disabled", true);
            $("#empId").focus();
        }
        function validateAndGetFormData() {
            buttonsDefault();
            var empIdVar = $("#empId").val();
            if (empIdVar === "") {
                buttonsDefault();
                return;
            }
            $("#empName").prop("disabled", false);
            $("#empSalary").prop("disabled", false);
            $("#empHRA").prop("disabled", false);
            $("#empDA").prop("disabled", false);
            $("#empDeduction").prop("disabled", false);
            var searchKey = JSON.stringify({ empId: empIdVar });
            var getRequest = createGET_BY_KEYRequest("90935222|-31949242385952273|90958832", "EMP-DB", "EmpData", searchKey);
            jQuery.ajaxSetup({ async: false });
            var resultObj = executeCommandAtGivenBaseUrl(getRequest, "http://api.login2explore.com:5577", "/api/irl");
            jQuery.ajaxSetup({ async: true });
            if (resultObj.status === 400) {
                $("#empName").focus();
                $("#empSave").prop("disabled", false);
                $("#empReset").prop("disabled", false);
            }
            else if (resultObj.status === 200) {
                var data = JSON.parse(resultObj.data).record;
                $("#empName").focus();
                $("#empChange").prop("disabled", false);
                $("#empReset").prop("disabled", false);
                $("#empId").prop("disabled", true);
                $("#empName").val(data.empName);
                $("#empSalary").val(data.empSalary);
                $("#empHRA").val(data.empHRA);
                $("#empDA").val(data.empDA);
                $("#empDeduction").val(data.empDeduction);
            }
            return JSON.stringify(resultObj);
        }
        function saveEmployee() {
            var empIdVar = $("#empId").val();
            var empNameVar = $("#empName").val();
            var empSalaryVar = $("#empSalary").val();
            var empHRAVar = $("#empHRA").val();
            var empDAVar = $("#empDA").val();
            var empDeductionVar = $("#empDeduction").val();
            var jsonStrObj = {
                empId: empIdVar,
                empName: empNameVar,
                empSalary: empSalaryVar,
                empHRA: empHRAVar,
                empDA: empDAVar,
                empDeduction: empDeductionVar
            }
            var putReqStr = createPUTRequest("90935222|-31949242385952273|90958832", JSON.stringify(jsonStrObj), "EMP-DB", "EmpData");
            jQuery.ajaxSetup({ async: false });
            var resultObj = executeCommandAtGivenBaseUrl(putReqStr, "http://api.login2explore.com:5577", "/api/iml")
            jQuery.ajaxSetup({ async: true });
            alert(JSON.stringify(resultObj));
            resetEmployee();
        }
        function changeEmployee() {
            var empIdVar = $("#empId").val();
            var empNameVar = $("#empName").val();
            var empSalaryVar = $("#empSalary").val();
            var empHRAVar = $("#empHRA").val();
            var empDAVar = $("#empDA").val();
            var empDeductionVar = $("#empDeduction").val();
            var jsonStrObj = {
                empId: empIdVar,
                empName: empNameVar,
                empSalary: empSalaryVar,
                empHRA: empHRAVar,
                empDA: empDAVar,
                empDeduction: empDeductionVar
            }
            var recordKey = validateAndGetFormData();
            recordKey = JSON.parse(recordKey).data.record._id;
            var updateRequest = createUPDATERecordRequest("90935222|-31949242385952273|90958832", JSON.stringify(jsonStrObj), "EMP-DB", "EmpData", recordKey);
            jQuery.ajaxSetup({ async: false });
            var resultObj = executeCommandAtGivenBaseUrl(updateRequest, "http://api.login2explore.com:5577", "/api/iml")
            jQuery.ajaxSetup({ async: true });
            alert(JSON.stringify(resultObj));
            resetEmployee();
        }
        resetEmployee();
        $("#empId").on("change", validateAndGetFormData).on("keypress", $("#empName").focus());

    </script>
</body>

</html>
